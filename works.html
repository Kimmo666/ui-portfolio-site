<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品集 | Kimmo</title>
    <meta name="description" content="UI 设计项目作品集，包含金融、电商、医疗场景案例拆解。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">Kimmo Designer</a>
        <nav class="nav" aria-label="主导航">
          <a href="index.html">首页</a>
          <a aria-current="page" href="works.html">作品</a>
          <a href="about.html">关于</a>
          <a href="contact.html">联系</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <section class="hero hero-compact">
        <h1>图片作品集</h1>
        <p>以图片为核心浏览方式。先看视觉，再按项目进入完整设计过程和结果说明。</p>
      </section>

      <section class="section">
        <div class="section-title-row">
          <h2>全部作品</h2>
          <p>共 18 张展示图（点击图片放大，点击说明进入案例）</p>
        </div>
        <div class="filters" data-filter-group="works" aria-label="作品分类">
          <button class="filter-tag active" type="button" data-filter="all">全部</button>
          <button class="filter-tag" type="button" data-filter="mobile">移动端 App</button>
          <button class="filter-tag" type="button" data-filter="web">网页端</button>
          <button class="filter-tag" type="button" data-filter="system">设计系统</button>
          <button class="filter-tag" type="button" data-filter="flow">流程优化</button>
        </div>

        <div class="masonry">
          <a
            class="work-shot"
            href="case-finflow.html"
            style="--shot-height: 360px"
            data-category="mobile flow"
          >
            <div class="photo-frame">
              <img
                class="photo-media"
                src="https://picsum.photos/id/0/1200/1400"
                data-asset="finflow/works-01"
                alt="FinFlow 开户主流程设计图"
                loading="lazy"
                decoding="async"
              />
            </div>
            <figcaption><span>FinFlow</span><span>Mobile</span></figcaption>
          </a>
          <a
            class="work-shot"
            href="case-shoplane.html"
            style="--shot-height: 260px"
            data-category="web flow"
          >
            <div class="photo-frame">
              <img
                class="photo-media"
                src="https://picsum.photos/id/20/1200/1000"
                data-asset="shoplane/works-01"
                alt="Shoplane 购物车与结算页面"
                loading="lazy"
                decoding="async"
              />
            </div>
            <figcaption><span>Shoplane</span><span>Checkout</span></figcaption>
          </a>
          <a
            class="work-shot"
            href="case-healthbridge.html"
            style="--shot-height: 320px"
            data-category="web flow"
          >
            <div class="photo-frame">
              <img
                class="photo-media"
                src="https://picsum.photos/id/96/1200/1300"
                data-asset="healthbridge/works-01"
                alt="HealthBridge 医生选择界面"
                loading="lazy"
                decoding="async"
              />
            </div>
            <figcaption><span>HealthBridge</span><span>Healthcare</span></figcaption>
          </a>
          <a
            class="work-shot"
            href="case-finflow.html"
            style="--shot-height: 240px"
            data-category="mobile flow"
          >
            <div class="photo-frame">
              <img
                class="photo-media"
                src="https://picsum.photos/id/48/1200/900"
                data-asset="finflow/works-02"
                alt="FinFlow 转账反馈状态页面"
                loading="lazy"
                decoding="async"
              />
            </div>
            <figcaption><span>FinFlow</span><span>Flow</span></figcaption>
          </a>
          <a
            class="work-shot"
            href="case-shoplane.html"
            style="--shot-height: 390px"
            data-category="web flow"
          >
            <div class="photo-frame">
              <img
                class="photo-media"
                src="https://picsum.photos/id/60/1200/1500"

                loading="lazy"
                decoding="async"
              />
            </div>
            <figcaption><span>Shoplane</span><span>E-commerce</span></figcaption>
          </a>
          <a
            class="work-shot"
            href="case-healthbridge.html"
            style="--shot-height: 260px"
            data-category="web flow"
          >
            <div class="photo-frame">
              <img
                class="photo-media"

            style="--shot-height: 300px"
            data-category="mobile system"
          >
            <div class="photo-frame">
              <img
                class="photo-media"

          >
            <div class="photo-frame">
              <img
                class="photo-media"

          <a
            class="work-shot"
            href="case-healthbridge.html"
            style="--shot-height: 280px"
            data-category="web mobile flow"
          >
            <div class="photo-frame">
              <img
                class="photo-media"
                src="https://picsum.photos/id/1011/1200/1100"
                data-asset="healthbridge/works-03"

                loading="lazy"
                decoding="async"
              />
            </div>
            <figcaption><span>HealthBridge</span><span>UI</span></figcaption>
          </a>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container">© <span data-year></span> Kimmo. All rights reserved.</div>

    <script src="script.js"></script>
